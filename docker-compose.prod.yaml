services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    env_file:
      - .env.production
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build:
      context: .
      dockerfile: backend.Dockerfile
    restart: unless-stopped
    env_file:
      - .env.production
    ports:
      - "127.0.0.1:8080:8080"
    depends_on:
      - postgres

volumes:
  pgdata:
