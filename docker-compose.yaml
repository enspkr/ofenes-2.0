services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ofenes
      POSTGRES_USER: ofenes
      POSTGRES_PASSWORD: ofenes
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build:
      context: .
      dockerfile: backend.Dockerfile
    ports:
      - "8080:8080"
    volumes:
      - .:/app
    environment:
      - PORT=8080
      - DATABASE_URL=postgres://ofenes:ofenes@postgres:5432/ofenes?sslmode=disable
    depends_on:
      - postgres

  frontend:
    build:
      context: ./frontend
      dockerfile: ../frontend.Dockerfile
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - VITE_API_URL=http://backend:8080
    depends_on:
      - backend

volumes:
  pgdata:
